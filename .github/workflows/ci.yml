name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Byte-compile all modules
        run: python -m compileall -q app.py data.py charts.py callbacks.py components.py fangraphs_api.py baseball_csv_generator.py live_stats.py legacy

      - name: Check launcher.sh syntax
        run: bash -n launcher.sh

      - name: Run tests
        run: python -m pytest tests/ -q
